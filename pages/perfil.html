<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil | Pastelería Mil Sabores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:2rem; }
    .tab-btn {
      padding:0.7rem 1.4rem;
      border:none;
      background:transparent;
      font-family:'Lato',sans-serif;
      font-weight:700;
      font-size:0.92rem;
      cursor:pointer;
      color:var(--text-light);
      border-bottom:3px solid transparent;
      margin-bottom:-2px;
      transition:color 0.2s, border-color 0.2s;
    }
    .tab-btn.active { color:var(--chocolate); border-bottom-color:var(--chocolate); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* Timeline seguimiento */
    .tracking-timeline {
      position:relative;
      padding:1rem 0;
    }
    .tracking-timeline::before {
      content:'';
      position:absolute;
      left:24px;
      top:0; bottom:0;
      width:3px;
      background:var(--border);
    }
    .tracking-step {
      display:flex;
      align-items:flex-start;
      gap:1.2rem;
      padding:0.8rem 0;
      position:relative;
    }
    .tracking-dot {
      width:50px; height:50px;
      border-radius:50%;
      border:3px solid var(--border);
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.3rem;
      flex-shrink:0;
      z-index:1;
      transition:all 0.3s;
    }
    .tracking-dot.done { border-color:var(--chocolate); background:var(--chocolate); }
    .tracking-dot.current { border-color:var(--chocolate); background:var(--rosa); animation:pulse 1.5s ease-in-out infinite; }
    .tracking-dot.pending { opacity:0.4; }
    @keyframes pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(139,69,19,0.3); }
      50% { box-shadow:0 0 0 10px rgba(139,69,19,0); }
    }
    .tracking-info { flex:1; padding-top:0.3rem; }
    .tracking-title { font-weight:900; color:var(--text-dark); font-size:0.95rem; }
    .tracking-title.active { color:var(--chocolate); }
    .tracking-desc { font-size:0.82rem; color:var(--text-light); margin-top:0.2rem; }
    .tracking-time { font-size:0.75rem; color:var(--text-light); margin-top:0.2rem; font-style:italic; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-logo">🎂</span>
      <a href="../index.html" class="brand-name">Mil Sabores</a>
    </div>
    <ul class="nav-links">
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="catalogo.html">Catálogo</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="seguimiento.html">📦 Seguimiento</a></li>
      <li><a href="carrito.html">🛒 Carrito <span class="cart-badge" id="cartBadge">0</span></a></li>
      <li><a href="perfil.html" id="navAuthLink" class="active">Mi Perfil</a></li>
    </ul>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
  </nav>

  <div id="profileContent"></div>

  <footer class="footer" style="margin-top:4rem">
    <div class="footer-bottom"><p>© 2024 Pastelería Mil Sabores. Todos los derechos reservados.</p></div>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const user = getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      renderProfile(user);
    });

    function renderProfile(user) {
      const age = user.birthYear ? new Date().getFullYear() - user.birthYear : null;
      const discPct = age >= 50 ? 50 : user.codigoFelices50 ? 10 : 0;
      const discBadge = discPct > 0
        ? `<span class="profile-badge">${discPct === 50 ? '🎉 50% descuento (+50 años)' : '🏷️ 10% descuento FELICES50'}</span>`
        : '';
      const duocBadge = user.emailDuoc
        ? `<span class="profile-badge" style="background:var(--rosa);color:var(--chocolate);margin-left:0.4rem">🎓 Duoc UC</span>` : '';

      const bdayAlert = isDuocBirthday(user)
        ? `<div style="background:var(--rosa);color:var(--chocolate);text-align:center;padding:1rem;font-weight:700;border-radius:12px;margin-bottom:1.5rem">
             🎂 ¡Feliz Cumpleaños ${user.name.split(' ')[0]}! Tu torta especial es GRATIS hoy 🎉
             <a href="catalogo.html?cat=especiales" class="btn btn-primary btn-sm" style="margin-left:1rem">Reclamar ahora</a>
           </div>` : '';

      document.getElementById('profileContent').innerHTML = `
        <div class="page-header">
          <h1>👤 Mi Perfil</h1>
          <p>Gestiona tu cuenta y pedidos</p>
        </div>

        <div class="container" style="padding:2rem 2rem">
          ${bdayAlert}

          <div class="profile-header">
            <div class="profile-avatar">👤</div>
            <div class="profile-name">${user.name}</div>
            <div style="color:var(--text-light);font-size:0.88rem;margin:0.3rem 0">${user.email}</div>
            ${discBadge}${duocBadge}
          </div>

          <!-- TABS -->
          <div class="tabs">
            <button class="tab-btn active" onclick="showTab('info')">👤 Mi Información</button>
            <button class="tab-btn" onclick="showTab('pedidos')">📦 Mis Pedidos</button>
            <button class="tab-btn" onclick="showTab('recomendados')">⭐ Para Ti</button>
          </div>

          <!-- TAB: INFO -->
          <div class="tab-panel active" id="tab-info">
            <div style="max-width:540px">
              <div id="infoView" style="background:var(--white);border-radius:16px;padding:1.5rem;box-shadow:0 2px 8px var(--shadow)">
                <div style="display:grid;gap:0.8rem;margin-bottom:1.2rem">
                  <div><strong>Nombre:</strong> ${user.name}</div>
                  <div><strong>Email:</strong> ${user.email}</div>
                  <div><strong>Teléfono:</strong> ${user.phone || '—'}</div>
                  <div><strong>Dirección:</strong> ${user.address || '—'}</div>
                  <div><strong>Fecha de nacimiento:</strong> ${user.birthdate || '—'}</div>
                  <div><strong>Preferencias:</strong> ${user.preferences || '—'}</div>
                  <div><strong>Miembro desde:</strong> ${new Date(user.createdAt).toLocaleDateString('es-CL',{year:'numeric',month:'long',day:'numeric'})}</div>
                  ${user.codigoFelices50 ? '<div style="color:var(--success);font-weight:700">✅ Código FELICES50 activo</div>' : ''}
                </div>
                <div style="display:flex;gap:0.8rem;flex-wrap:wrap">
                  <button class="btn btn-secondary btn-sm" onclick="showEditForm()">✏️ Editar</button>
                  <button class="btn btn-outline btn-sm" onclick="logout()" style="color:var(--error);border-color:var(--error)">🚪 Cerrar sesión</button>
                </div>
              </div>

              <div id="infoEdit" style="display:none;background:var(--white);border-radius:16px;padding:1.5rem;box-shadow:0 2px 8px var(--shadow)">
                <div id="editAlert" class="alert"></div>
                <div class="form-group"><label>Nombre completo</label><input type="text" id="editName" value="${user.name}" /></div>
                <div class="form-group"><label>Teléfono</label><input type="tel" id="editPhone" value="${user.phone||''}" placeholder="+56 9 1234 5678"/></div>
                <div class="form-group"><label>Dirección</label><input type="text" id="editAddress" value="${user.address||''}" placeholder="Calle, número, ciudad"/></div>
                <div class="form-group">
                  <label>Preferencias</label>
                  <select id="editPref">
                    <option value="">Sin preferencia</option>
                    <option value="tortas" ${user.preferences==='tortas'?'selected':''}>Tortas</option>
                    <option value="postres" ${user.preferences==='postres'?'selected':''}>Postres</option>
                    <option value="vegano" ${user.preferences==='vegano'?'selected':''}>Vegano</option>
                    <option value="sin-gluten" ${user.preferences==='sin-gluten'?'selected':''}>Sin gluten</option>
                    <option value="sin-azucar" ${user.preferences==='sin-azucar'?'selected':''}>Sin azúcar</option>
                    <option value="tradicional" ${user.preferences==='tradicional'?'selected':''}>Tradicional</option>
                  </select>
                </div>
                <div style="display:flex;gap:0.8rem">
                  <button class="btn btn-primary btn-sm" onclick="saveEdit()">💾 Guardar cambios</button>
                  <button class="btn btn-outline btn-sm" onclick="cancelEdit()">Cancelar</button>
                </div>
              </div>
            </div>
          </div>

          <!-- TAB: PEDIDOS -->
          <div class="tab-panel" id="tab-pedidos">
            <div id="ordersList"></div>
          </div>

          <!-- TAB: RECOMENDADOS -->
          <div class="tab-panel" id="tab-recomendados">
            <p style="color:var(--text-light);margin-bottom:1.5rem">Productos seleccionados según tus preferencias</p>
            <div class="products-grid" id="recommendedGrid"></div>
          </div>
        </div>
      `;

      renderOrders(user);
      renderRecommended(user, discPct);
    }

    function renderOrders(user) {
      const orders = user.orders || [];
      const container = document.getElementById('ordersList');
      if (!orders.length) {
        container.innerHTML = `
          <div class="empty-state" style="padding:3rem">
            <div class="empty-state-icon">📦</div>
            <h3>Sin pedidos aún</h3>
            <p>Realiza tu primer pedido desde el catálogo</p>
            <a href="catalogo.html" class="btn btn-primary" style="margin-top:1rem">Ir al Catálogo</a>
          </div>`;
        return;
      }

      container.innerHTML = orders.map(order => {
        const statusSteps = [
          { key:'recibido', icon:'✅', label:'Pedido recibido', desc:'Tu pedido fue registrado en nuestro sistema.' },
          { key:'preparando', icon:'👨‍🍳', label:'Preparando', desc:'Nuestros reposteros están preparando tu pedido con cariño.' },
          { key:'listo', icon:'📦', label:'Listo para despacho', desc:'Tu pedido está listo y esperando al repartidor.' },
          { key:'enviado', icon:'🚚', label:'En despacho', desc:'Tu pedido está en camino a tu dirección.' },
          { key:'entregado', icon:'🏠', label:'Entregado', desc:'¡Pedido entregado! Esperamos que lo disfrutes mucho.' },
        ];

        const statusOrder = ['recibido','preparando','listo','enviado','entregado'];
        const currentIdx = statusOrder.indexOf(order.status === 'preparando' ? 'preparando' : order.status) ?? 0;
        // 'recibido' siempre done, current = order.status
        const effectiveIdx = Math.max(1, currentIdx + 1); // at least "preparando" reached

        const timelineHtml = statusSteps.map((step, i) => {
          const stepNum = i; // 0=recibido, 1=preparando ...
          let cls = 'pending';
          if (stepNum < effectiveIdx) cls = 'done';
          else if (stepNum === effectiveIdx) cls = 'current';
          const titleCls = stepNum <= effectiveIdx ? 'active' : '';
          return `
            <div class="tracking-step">
              <div class="tracking-dot ${cls}">${cls === 'done' ? '✓' : step.icon}</div>
              <div class="tracking-info">
                <div class="tracking-title ${titleCls}">${step.label}</div>
                <div class="tracking-desc">${step.desc}</div>
                ${stepNum <= effectiveIdx ? `<div class="tracking-time">${stepNum === 0 ? new Date(order.createdAt).toLocaleString('es-CL') : stepNum < effectiveIdx ? 'Completado' : 'En proceso...'}</div>` : ''}
              </div>
            </div>`;
        }).join('');

        return `
          <div style="background:var(--white);border-radius:20px;padding:1.5rem;box-shadow:0 4px 16px var(--shadow);margin-bottom:1.5rem">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem">
              <div>
                <div style="font-family:'Pacifico',cursive;color:var(--chocolate);font-size:1.1rem">${order.id}</div>
                <div style="font-size:0.82rem;color:var(--text-light)">${new Date(order.createdAt).toLocaleDateString('es-CL',{year:'numeric',month:'long',day:'numeric'})}</div>
              </div>
              <div style="text-align:right">
                <div style="font-family:'Pacifico',cursive;color:var(--chocolate)">${formatPrice(order.total)}</div>
                <a href="boleta.html?order=${order.id}" class="btn btn-secondary btn-sm" style="margin-top:0.4rem">🧾 Ver Boleta</a>
              </div>
            </div>

            <!-- Productos -->
            <div style="margin-bottom:1rem;padding:0.8rem;background:var(--bg-cream);border-radius:10px;font-size:0.88rem">
              ${order.items.map(i=>`<span>${i.emoji||'🎂'} ${i.name} ×${i.qty}</span>`).join(' &nbsp;·&nbsp; ')}
            </div>

            <!-- Entrega -->
            <div style="display:flex;gap:1.5rem;flex-wrap:wrap;font-size:0.85rem;color:var(--text-dark);margin-bottom:1rem">
              <span>📅 Entrega: <strong>${order.deliveryDate}</strong></span>
              <span>🕐 <strong>${order.deliveryTime || '—'}</strong></span>
              <span>📍 <strong>${order.deliveryAddress}</strong></span>
            </div>

            <!-- Timeline seguimiento -->
            <details>
              <summary style="cursor:pointer;font-weight:700;color:var(--chocolate);font-size:0.9rem;margin-bottom:0.5rem;list-style:none">
                🔍 Ver seguimiento detallado ▼
              </summary>
              <div class="tracking-timeline" style="margin-top:1rem">
                ${timelineHtml}
              </div>
            </details>

            <!-- Compartir -->
            <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center">
              <span style="font-size:0.8rem;color:var(--text-light)">Compartir pedido:</span>
              <button class="btn btn-outline btn-sm" onclick="shareOrder('${order.id}','whatsapp')">💬</button>
              <button class="btn btn-outline btn-sm" onclick="shareOrder('${order.id}','facebook')">📘</button>
              <button class="btn btn-outline btn-sm" onclick="shareOrder('${order.id}','twitter')">🐦</button>
              <button class="btn btn-outline btn-sm" onclick="shareOrder('${order.id}','instagram')">📸</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderRecommended(user, discPct) {
      const pref = user.preferences;
      const catMap = {
        tortas:['tortas-cuadradas','tortas-circulares','especiales'],
        postres:['postres-individuales'],
        vegano:['vegana'],
        'sin-gluten':['sin-gluten'],
        'sin-azucar':['sin-azucar'],
        tradicional:['tradicional']
      };
      let rec = products;
      if (pref && catMap[pref]) rec = products.filter(p => catMap[pref].includes(p.category));
      document.getElementById('recommendedGrid').innerHTML = rec.slice(0,4).map(p => renderProductCard(p, discPct)).join('');
    }

    function showTab(name) {
      document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-'+name).classList.add('active');
      event.target.classList.add('active');
    }

    function showEditForm() {
      document.getElementById('infoView').style.display = 'none';
      document.getElementById('infoEdit').style.display = 'block';
    }
    function cancelEdit() {
      document.getElementById('infoView').style.display = 'block';
      document.getElementById('infoEdit').style.display = 'none';
    }
    function saveEdit() {
      const user = getUser();
      const name = document.getElementById('editName').value.trim();
      if (!name) { showToast('El nombre no puede estar vacío'); return; }
      user.name = name;
      user.phone = document.getElementById('editPhone').value.trim();
      user.address = document.getElementById('editAddress').value.trim();
      user.preferences = document.getElementById('editPref').value;
      setUser(user);
      const users = JSON.parse(localStorage.getItem('ms_users')||'[]');
      const idx = users.findIndex(u=>u.email===user.email);
      if (idx>=0) { users[idx]=user; localStorage.setItem('ms_users',JSON.stringify(users)); }
      showToast('✅ Perfil actualizado');
      renderProfile(user);
    }

    function shareOrder(orderId, network) {
      const user = getUser();
      const order = (user.orders||[]).find(o=>o.id===orderId);
      if (!order) return;
      const text = '🎂 ¡Acabo de pedir en Pastelería Mil Sabores! '+order.items.map(i=>i.emoji+' '+i.name).join(', ')+' 😍';
      const url = 'https://milsabores.cl';
      const urls = {
        whatsapp:'https://wa.me/?text='+encodeURIComponent(text+' '+url),
        facebook:'https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url)+'&quote='+encodeURIComponent(text),
        twitter:'https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),
      };
      if (network==='instagram') navigator.clipboard.writeText(text+' '+url).then(()=>showToast('📋 Copiado para Instagram'));
      else window.open(urls[network],'_blank','width=600,height=400');
    }
  </script>
</body>
</html>
