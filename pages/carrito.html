<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito | Pastelería Mil Sabores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="icon" type="image/jpeg" href="../assets/favicon.jpg" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-logo">🎂</span>
      <a href="../index.html" class="brand-name">Mil Sabores</a>
    </div>
    <ul class="nav-links">
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="catalogo.html">Catálogo</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="seguimiento.html">📦 Seguimiento</a></li>
      <li><a href="carrito.html" class="active">🛒 Carrito <span class="cart-badge" id="cartBadge">0</span></a></li>
      <li><a href="login.html" id="navAuthLink">Iniciar Sesión</a></li>
    </ul>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
  </nav>

  <div class="page-header">
    <h1>🛒 Mi Carrito</h1>
    <p>Revisa y confirma tus productos</p>
  </div>

  <div class="container" style="padding: 2rem 2rem 4rem">
    <div id="cartContent"></div>
  </div>

  <!-- MODAL FECHA ENTREGA -->
  <div class="modal-overlay hidden" id="dateModal">
    <div class="modal">
      <button class="modal-close" onclick="closeDateModal()">✕</button>
      <h2 class="form-title" style="font-size:1.5rem">📅 Fecha de Entrega</h2>
      <p class="form-subtitle">Selecciona cuándo quieres recibir tu pedido</p>
      <div class="form-group">
        <label>Fecha preferida *</label>
        <input type="date" id="deliveryDate" min="" />
      </div>
      <div class="form-group">
        <label>Horario de entrega</label>
        <select id="deliveryTime">
          <option value="09:00-12:00">🕘 09:00 - 12:00</option>
          <option value="12:00-15:00">🕛 12:00 - 15:00</option>
          <option value="15:00-18:00">🕒 15:00 - 18:00</option>
          <option value="18:00-21:00">🕕 18:00 - 21:00</option>
        </select>
      </div>
      <div class="form-group">
        <label>Dirección de entrega *</label>
        <input type="text" id="deliveryAddress" placeholder="Calle, número, ciudad" />
      </div>
      <div class="form-group">
        <label>Notas adicionales (opcional)</label>
        <input type="text" id="deliveryNotes" placeholder="Ej: Timbre 2, dejar en conserjería..." />
      </div>
      <button class="btn btn-primary btn-block" onclick="confirmOrder()" style="padding:0.9rem;font-size:1rem">
        ✅ Confirmar Pedido
      </button>
    </div>
  </div>

  <!-- MODAL CONFIRMACIÓN -->
  <div class="modal-overlay hidden" id="orderModal">
    <div class="modal" style="text-align:center">
      <div style="font-size:4rem;margin-bottom:1rem">🎉</div>
      <h2 class="form-title">¡Pedido Confirmado!</h2>
      <p style="color:var(--text-dark);margin:0.8rem 0;font-size:0.95rem" id="orderNumber"></p>
      <div id="orderDetails" style="background:var(--bg-cream);border-radius:12px;padding:1.2rem;margin:1rem 0;font-size:0.88rem;text-align:left"></div>
      <div style="display:grid;gap:0.7rem;margin-top:1rem">
        <a id="boletaBtn" href="boleta.html" class="btn btn-primary btn-block">🧾 Ver Boleta de Compra</a>
        <button class="btn btn-secondary btn-block" onclick="shareOrder()">📤 Compartir mi pedido</button>
        <div style="display:flex;gap:0.5rem;justify-content:center;margin-top:0.3rem">
          <button class="btn btn-outline btn-sm" onclick="shareOrderNet('whatsapp')">💬 WhatsApp</button>
          <button class="btn btn-outline btn-sm" onclick="shareOrderNet('facebook')">📘 Facebook</button>
          <button class="btn btn-outline btn-sm" onclick="shareOrderNet('twitter')">🐦 Twitter</button>
          <button class="btn btn-outline btn-sm" onclick="shareOrderNet('instagram')">📸 Instagram</button>
        </div>
        <button class="btn btn-outline btn-block" onclick="closeOrderModal()" style="margin-top:0.3rem">Ver mis pedidos</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-bottom"><p>© 2024 Pastelería Mil Sabores.</p></div>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script>
    let lastOrder = null;

    window.addEventListener('DOMContentLoaded', () => {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      document.getElementById('deliveryDate').min = tomorrow.toISOString().split('T')[0];
      document.getElementById('deliveryDate').value = tomorrow.toISOString().split('T')[0];
      const user = getUser();
      if (user && user.address) document.getElementById('deliveryAddress').value = user.address;
      renderCart();
    });

    function renderCart() {
      const cart = getCart();
      const user = getUser();
      const { subtotal, discount, total } = getCartTotal();
      const container = document.getElementById('cartContent');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🛒</div>
            <h3>Tu carrito está vacío</h3>
            <p>Agrega productos desde nuestro catálogo</p>
            <a href="catalogo.html" class="btn btn-primary" style="margin-top:1rem">Ver Catálogo</a>
          </div>`;
        return;
      }

      const itemsHtml = cart.map(item => {
        const p = products.find(prod => prod.id === item.id);
        if (!p) return '';
        const itemTotal = p.price * item.qty;
        return `
          <div class="cart-item">
            <div class="cart-item-emoji">${p.emoji}</div>
            <div class="cart-item-info">
              <div class="cart-item-name">${p.name}</div>
              <div class="cart-item-price">${formatPrice(itemTotal)}</div>
              ${item.message ? `<div class="cart-item-msg">💬 "${item.message}"</div>` : ''}
            </div>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty('${p.id}', '${item.message}', ${item.qty - 1})">−</button>
              <span class="qty-display">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty('${p.id}', '${item.message}', ${item.qty + 1})">+</button>
            </div>
            <button class="remove-btn" onclick="deleteItem('${p.id}', '${item.message}')" title="Eliminar">🗑️</button>
          </div>`;
      }).join('');

      const discountLabel = user
        ? (user.birthYear && (new Date().getFullYear() - user.birthYear >= 50) ? '50% descuento (+50 años)' : user.codigoFelices50 ? '10% descuento (FELICES50)' : '')
        : '';
      const isBdayFree = user && isINACAPBirthday(user);

      container.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start;">
          <div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
              <h2 style="font-family:'Pacifico',cursive;color:var(--chocolate);">Tus productos</h2>
              <button class="btn btn-outline btn-sm" onclick="emptyCart()">Vaciar carrito</button>
            </div>
            ${itemsHtml}
            <div style="margin-top:1rem;">
              <a href="catalogo.html" class="btn btn-secondary btn-sm">+ Agregar más productos</a>
            </div>
          </div>
          <div>
            <div class="cart-summary">
              <h3 style="font-family:'Pacifico',cursive;color:var(--chocolate);margin-bottom:1rem;">Resumen</h3>
              <div class="summary-row"><span>Subtotal (${cart.reduce((a,i)=>a+i.qty,0)} productos)</span><span>${formatPrice(subtotal)}</span></div>
              ${discount > 0 ? `<div class="summary-row summary-discount"><span>${discountLabel}</span><span>−${formatPrice(discount)}</span></div>` : ''}
              ${isBdayFree ? `<div class="summary-row summary-discount"><span>🎂 Torta cumpleaños INACAP</span><span>−GRATIS</span></div>` : ''}
              <div class="summary-total"><span>Total</span><span>${formatPrice(total)}</span></div>
              ${!user ? `<p style="font-size:0.82rem;color:var(--text-light);text-align:center;margin:0.8rem 0;"><a href="login.html" style="color:var(--chocolate);font-weight:700">Inicia sesión</a> para ver tus descuentos</p>` : ''}
              <button class="btn btn-primary btn-block" style="margin-top:1rem;font-size:1rem;padding:0.9rem" onclick="openDateModal()">
                📅 Elegir fecha y confirmar pedido
              </button>
              <div style="margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem">
                <p style="font-size:0.8rem;color:var(--text-light);margin-bottom:0.6rem;text-align:center">Compartir carrito</p>
                <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap">
                  <button class="btn btn-outline btn-sm" onclick="shareCartNet('whatsapp')">💬</button>
                  <button class="btn btn-outline btn-sm" onclick="shareCartNet('facebook')">📘</button>
                  <button class="btn btn-outline btn-sm" onclick="shareCartNet('twitter')">🐦</button>
                  <button class="btn btn-outline btn-sm" onclick="shareCartNet('instagram')">📸</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function changeQty(id, msg, newQty) {
      if (newQty < 1) { deleteItem(id, msg); return; }
      updateQty(id, msg, newQty);
      renderCart();
    }

    function deleteItem(id, msg) {
      removeFromCart(id, msg);
      renderCart();
      showToast('🗑️ Producto eliminado del carrito');
    }

    function emptyCart() {
      if (confirm('¿Seguro que quieres vaciar el carrito?')) { clearCart(); renderCart(); }
    }

    function openDateModal() {
      if (getCart().length === 0) { showToast('Tu carrito está vacío'); return; }
      if (!getUser()) { showToast('Inicia sesión para confirmar tu pedido'); setTimeout(() => window.location.href='login.html', 1200); return; }
      document.getElementById('dateModal').classList.remove('hidden');
    }

    function closeDateModal() {
      document.getElementById('dateModal').classList.add('hidden');
    }

    function confirmOrder() {
      const date = document.getElementById('deliveryDate').value;
      const time = document.getElementById('deliveryTime').value;
      const address = document.getElementById('deliveryAddress').value.trim();
      const notes = document.getElementById('deliveryNotes').value.trim();

      if (!date) { showToast('Selecciona una fecha de entrega'); return; }
      if (!address) { showToast('Ingresa la dirección de entrega'); return; }

      const user = getUser();
      const cart = getCart();
      const { total, discount } = getCartTotal();

      const order = {
        id: 'MS-' + Date.now(),
        items: cart.map(item => {
          const p = products.find(pr => pr.id === item.id);
          return { ...item, name: p ? p.name : item.id, price: p ? p.price : 0, emoji: p ? p.emoji : '🎂' };
        }),
        total, discount,
        deliveryDate: date,
        deliveryTime: time,
        deliveryAddress: address,
        deliveryNotes: notes,
        status: 'preparando',
        createdAt: new Date().toISOString()
      };

      if (user) {
        if (!user.orders) user.orders = [];
        user.orders.unshift(order);
        setUser(user);
        const users = JSON.parse(localStorage.getItem('ms_users') || '[]');
        const idx = users.findIndex(u => u.email === user.email);
        if (idx >= 0) { users[idx] = user; localStorage.setItem('ms_users', JSON.stringify(users)); }
      }

      lastOrder = order;
      clearCart();
      closeDateModal();

      document.getElementById('orderNumber').textContent = 'N° de pedido: ' + order.id;
      document.getElementById('orderDetails').innerHTML = `
        <p><strong>📅 Entrega:</strong> ${new Date(date+'T12:00:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'})} entre ${time}</p>
        <p><strong>📍 Dirección:</strong> ${address}</p>
        ${notes ? `<p><strong>📝 Notas:</strong> ${notes}</p>` : ''}
        <p><strong>💰 Total:</strong> ${formatPrice(total)}</p>
        <p style="margin-top:0.8rem;color:var(--chocolate);font-weight:700">Estado: 🍳 Preparando tu pedido</p>`;

      document.getElementById('boletaBtn').href = 'boleta.html?order=' + order.id;
      document.getElementById('orderModal').classList.remove('hidden');
    }

    function closeOrderModal() {
      document.getElementById('orderModal').classList.add('hidden');
      window.location.href = 'perfil.html';
    }

    function shareCartNet(network) {
      const cart = getCart();
      const text = '🎂 ¡Mira lo que voy a pedir en Pastelería Mil Sabores! ' +
        cart.map(i => { const p = products.find(pr=>pr.id===i.id); return p ? p.emoji+' '+p.name : ''; }).filter(Boolean).join(', ');
      openShareWindow(network, text);
    }

    function shareOrder() {
      if (!lastOrder) return;
      const text = '🎂 ¡Acabo de pedir en Pastelería Mil Sabores! ' +
        lastOrder.items.map(i => i.emoji+' '+i.name).join(', ') + ' 😍';
      if (navigator.share) navigator.share({ title: 'Mi pedido Mil Sabores', text });
      else navigator.clipboard.writeText(text).then(() => showToast('📋 Copiado'));
    }

    function shareOrderNet(network) {
      if (!lastOrder) return;
      const text = '🎂 ¡Acabo de pedir en Pastelería Mil Sabores! ' + lastOrder.items.map(i=>i.emoji+' '+i.name).join(', ');
      openShareWindow(network, text);
    }

    function openShareWindow(network, text) {
      const url = 'https://milsabores.cl';
      const urls = {
        whatsapp: 'https://wa.me/?text='+encodeURIComponent(text+' '+url),
        facebook: 'https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url)+'&quote='+encodeURIComponent(text),
        twitter: 'https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),
      };
      if (network === 'instagram') {
        navigator.clipboard.writeText(text+' '+url).then(() => showToast('📋 Copiado — pégalo en Instagram'));
      } else if (urls[network]) {
        window.open(urls[network], '_blank', 'width=600,height=400');
      }
    }
  </script>
</body>
</html>
